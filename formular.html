<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SirTros-city | Přihláška</title>

    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        textarea {
            resize: none !important;
            width: 100%;
            height: 120px;
            box-sizing: border-box;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: white;
            font-family: inherit;
        }
        
        form, #thank-you-message {
            max-width: 400px;
            margin: 40px auto;
            padding: 20px;
            background: #1e1e1e;
            border-radius: 10px;
            color: white;
            border: 1px solid #333;
        }

        #thank-you-message {
            display: none; /* Skryté, dokud se neodešle formulář */
            text-align: center;
        }
        
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            box-sizing: border-box;
            border-radius: 5px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: white;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        button:disabled {
            background-color: #444;
            cursor: not-allowed;
        }

        .info-text {
            text-align: center;
            color: #888;
            font-size: 13px;
            margin-top: -10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="main-content">
        <!-- FORMULÁŘ S ID PRO JAVASCRIPT -->
        <form id="my-form" action="https://formspree.io/mgondwdr" method="POST">
            <h2 style="text-align: center; margin-bottom: 10px;">Přihláška do SirTros-city</h2>
            <p class="info-text">Vyřízení může trvat až 24h.</p>

            <label style="display: block; margin-bottom: 5px;">Nickname:</label>
            <input type="text" name="nickname" placeholder="Tvé jméno ve hře" required>

            <label style="display: block; margin-bottom: 5px;">Věk:</label>
            <input type="number" name="age" placeholder="Tvůj věk" required>

            <label style="display: block; margin-bottom: 5px;">Napiš, proč chceš hrát:</label>
            <textarea name="reason" placeholder="Tady napiš svůj důvod..." required></textarea>

            <button type="submit" id="submit-btn" style="margin-top: 15px;">Odeslat přihlášku</button>
        </form>

        <!-- MOJE VLASTNÍ PODĚKOVÁNÍ -->
        <div id="thank-you-message">
            <h2 style="color: #28a745;">Děkujeme!</h2>
            <p>Tvoje přihláška byla úspěšně odeslána. Vyčkej prosím na vyřízení.</p>
        </div>
    </div>

    <div style="text-align: center; margin-top: 20px;">
        <a href="index.html" style="color: #007bff; text-decoration: none;">← Zpět na hlavní stránku</a>
    </div>

    <script>
        const form = document.getElementById("my-form");
        const thankYouMessage = document.getElementById("thank-you-message");
        const submitBtn = document.getElementById("submit-btn");

        form.addEventListener("submit", async function(event) {
            event.preventDefault(); // Zabrání klasickému odeslání a přesměrování
            
            submitBtn.disabled = true;
            submitBtn.innerText = "Odesílám...";

            const data = new FormData(form);
            
            try {
                const response = await fetch(form.action, {
                    method: "POST",
                    body: data,
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    form.style.display = "none"; // Schová formulář
                    thankYouMessage.style.display = "block"; // Ukáže poděkování
                } else {
                    alert("Chyba při odesílání. Zkus to prosím znovu.");
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Odeslat přihlášku";
                }
            } catch (error) {
                alert("Nastal problém s připojením k serveru.");
                submitBtn.disabled = false;
                submitBtn.innerText = "Odeslat přihlášku";
            }
        });
    </script>

</body>
</html>
