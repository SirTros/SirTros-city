<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SirTros-city | Přihláška</title>
    <style>
        body { background-color: #121212; color: white; font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        textarea { resize: none !important; width: 100%; height: 120px; box-sizing: border-box; padding: 10px; border-radius: 5px; border: 1px solid #444; background: #2a2a2a; color: white; font-family: inherit; }
        form, #thank-you-box { max-width: 400px; margin: 40px auto; padding: 20px; background: #1e1e1e; border-radius: 10px; border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #thank-you-box { display: none; text-align: center; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; box-sizing: border-box; border-radius: 5px; border: 1px solid #444; background: #2a2a2a; color: white; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #444; cursor: not-allowed; }
        .info-text { text-align: center; color: #888; font-size: 13px; margin-top: -10px; margin-bottom: 20px; }
        .close-link { display: block; text-align: center; margin-top: 20px; color: #007bff; text-decoration: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="main-content">
        <!-- FORMULÁŘ: Upraveno na správné ID a odesílání -->
        <form id="my-form" action="https://formspree.io/mgondwdr" method="POST">
            <h2 style="text-align: center; margin-bottom: 10px;">Přihláška do SirTros-city</h2>
            <p class="info-text">Vyřízení může trvat až 24h.</p>

            <label style="display: block; margin-bottom: 5px;">Nickname:</label>
            <input type="text" name="nickname" placeholder="Tvé jméno ve hře" required>

            <label style="display: block; margin-bottom: 5px;">Věk:</label>
            <input type="number" name="age" placeholder="Tvůj věk" required>

            <label style="display: block; margin-bottom: 5px;">Napiš, proč chceš hrát:</label>
            <textarea name="reason" placeholder="Tady napiš svůj důvod..." required></textarea>

            <button type="submit" id="my-form-button" style="margin-top: 15px;">Odeslat přihlášku</button>
            <p id="my-form-status" style="text-align: center; margin-top: 10px; font-size: 14px;"></p>
        </form>

        <!-- PODĚKOVÁNÍ -->
        <div id="thank-you-box">
            <h2 style="color: #28a745;">Děkujeme!</h2>
            <p>Tvoje přihláška byla úspěšně odeslána.<br>Vyčkej prosím na vyřízení.</p>
            <button onclick="closeWindow()" style="margin-top: 15px; background-color: #444;">Zavřít okno</button>
        </div>
    </div>

    <a href="index.html" onclick="closeWindow(); return false;" class="close-link">← Zpět na hlavní stránku</a>

    <script>
        var form = document.getElementById("my-form");
        var thankYouBox = document.getElementById("thank-you-box");
        var button = document.getElementById("my-form-button");
        var status = document.getElementById("my-form-status");

        function closeWindow() {
            if (!window.close()) {
                window.location.href = "index.html";
            }
        }

        async function handleSubmit(event) {
          event.preventDefault();
          button.disabled = true;
          button.innerText = "Odesílám...";
          
          var data = new FormData(event.target);
          
          fetch(event.target.action, {
            method: form.method,
            body: data,
            headers: {
                'Accept': 'application/json'
            }
          }).then(response => {
            if (response.ok) {
              // ÚSPĚCH: Skryjeme formulář a ukážeme poděkování
              form.style.display = "none";
              thankYouBox.style.display = "block";
            } else {
              response.json().then(data => {
                if (Object.hasOwn(data, 'errors')) {
                  status.innerHTML = data["errors"].map(error => error["message"]).join(", ");
                } else {
                  status.innerHTML = "Jejda! Nastala chyba při odesílání.";
                }
                button.disabled = false;
                button.innerText = "Odeslat přihlášku";
              })
            }
          }).catch(error => {
            status.innerHTML = "Jejda! Nastala chyba při odesílání.";
            button.disabled = false;
            button.innerText = "Odeslat přihlášku";
          });
        }

        form.addEventListener("submit", handleSubmit);
    </script>
</body>
</html>
