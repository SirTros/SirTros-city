<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SirTros-city | Přihláška</title>

    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* PEVNÉ OKNO: nebude se hýbat ani roztahovat */
        textarea {
            resize: none !important;
            width: 100%;
            height: 120px;
            box-sizing: border-box;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: white;
            font-family: inherit;
        }
        
        form {
            max-width: 400px;
            margin: 40px auto;
            padding: 20px;
            background: #1e1e1e;
            border-radius: 10px;
            color: white;
            border: 1px solid #333;
        }
        
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            box-sizing: border-box;
            border-radius: 5px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: white;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        /* STYL PRO MALÝ ŠEDÝ POPISEK */
        .info-text {
            text-align: center;
            color: #888;
            font-size: 13px;
            margin-top: -10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="main-content">
        <!-- OPRAVENÁ ADRESA (přidáno /f/mgondwdr) -->
        <form action="https://formspree.io/mgondwdr" method="POST">
            <h2 style="text-align: center; margin-bottom: 10px;">Přihláška do SirTros-city</h2>
            
            <!-- NOVÝ POPISEK O 24H -->
            <p class="info-text">Vyřízení může trvat až 24h.</p>

            <label style="display: block; margin-bottom: 5px;">Nickname:</label>
            <input type="text" name="nickname" placeholder="Tvé jméno ve hře" required>

            <label style="display: block; margin-bottom: 5px;">Věk:</label>
            <input type="number" name="age" placeholder="Tvůj věk" required>

            <label style="display: block; margin-bottom: 5px;">Napiš, proč chceš hrát:</label>
            <!-- PEVNÉ OKNO -->
            <textarea name="reason" placeholder="Tady napiš svůj důvod..." required></textarea>

            <button type="submit" style="margin-top: 15px;">Odeslat přihlášku</button>
        </form>
    </div>

    <div style="text-align: center; margin-top: 20px;">
        <a href="index.html" style="color: #007bff; text-decoration: none;">← Zpět na hlavní stránku</a>
    </div>

</body>
</html>
