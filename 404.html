


<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SirTros-city | Minecraft server</title>

<link rel="icon" type="image/png" href="assets/images/logo.png">

<style>
:root {
    --primary: #00d2ff;
    --bg: #0f0f13;
    --card-bg: rgba(255, 255, 255, 0.05);
    --text: #ffffff;
    --nav-bg: rgba(0, 0, 0, 0.95);
}

body {
    overflow-y: scroll;
    scrollbar-width: thin;
    scrollbar-color: var(--primary) rgba(255,255,255,0.1);
}

body::-webkit-scrollbar {
    width: 10px;
}

body::-webkit-scrollbar-track {
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
}

body::-webkit-scrollbar-thumb {
    background-color: var(--primary);
    border-radius: 10px;
    border: 2px solid rgba(255,255,255,0.05);
}

body::-webkit-scrollbar-thumb:hover {
    background-color: #00f0ff;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; scroll-behavior: smooth; }
body { background-color: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden; }

.bg-glow {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0f0f13 100%);
    z-index: -1;
}

header, section { scroll-margin-top: 100px; }

nav {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 10%; background: var(--nav-bg);
    backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 1000;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    height: 100px;
}

.nav-brand { display: flex; align-items: center; gap: 20px; text-decoration: none; color: inherit; }
.logo-img { height: 70px; border-radius: 5px; image-rendering: -webkit-optimize-contrast; }
.logo-text { 
    font-size: 1.8rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px;
    -webkit-box-reflect: below -12px linear-gradient(transparent, rgba(255,255,255,0));
}

nav ul { display: flex; list-style: none; gap: 30px; }
nav ul li a { text-decoration: none; color: #aaa; font-weight: 600; text-transform: uppercase; font-size: 0.9rem; transition: 0.3s; }
nav ul li a:hover { color: var(--primary); }

section { padding: 100px 10%; border-bottom: 1px solid rgba(255,255,255,0.05); }
h2 { font-size: 2.5rem; text-align: center; margin-bottom: 50px; text-transform: uppercase; letter-spacing: 3px; color: var(--primary); }

header { height: calc(100vh - 200px); display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
.whitelist-status { background: rgba(0, 210, 255, 0.1); color: var(--primary); border: 1px solid var(--primary); padding: 6px 18px; border-radius: 30px; font-size: 0.85rem; font-weight: 700; margin-bottom: 25px; }
.ip-box { background: rgba(255,255,255,0.05); padding: 18px 35px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.3s; }
.ip-box:hover { border-color: var(--primary); transform: scale(1.02); }
    
.info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
.info-card { background: var(--card-bg); padding: 30px; border-radius: 15px; text-align: center; border: 1px solid rgba(0, 210, 255, 0.2); }
.info-card i { font-size: 2rem; color: var(--primary); margin-bottom: 15px; display: block; }

.gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
.gallery-item { height: 220px; background: var(--card-bg); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); position: relative; cursor: pointer; }
.gallery-item img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; transition: 0.5s; }
.gallery-item:hover img { opacity: 1; transform: scale(1.05); }
.gallery-text { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); color: white; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 2px 10px rgba(0,0,0,1); width: 100%; text-align: center; pointer-events: none; z-index: 10; font-size: 0.9rem; }

.social-section {
    text-align: center;
    padding: 50px 20px;
}

.vid-btn {
    display: inline-block; /* Drží tlačítka vedle sebe */
    padding: 14px 30px;    /* Původní výška/šířka */
    margin: 10px 15px;     /* MEZERA: 10px nahoru/dolů, 15px do stran */
    border-radius: 12px;
    font-weight: bold;
    text-decoration: none;
    font-size: 1.1rem;
    transition: 0.3s;
    color: #000;
}

.whatsapp-btn, .mclist-btn, .form-btn, .disc-btn {
    display: inline-block; /* Drží tlačítka vedle sebe */
    padding: 14px 30px;    /* Původní výška/šířka */
    margin: 10px 15px;     /* MEZERA: 10px nahoru/dolů, 15px do stran */
    border-radius: 12px;
    font-weight: bold;
    text-decoration: none;
    font-size: 1.1rem;
    transition: 0.3s;
    color: #fff;
}

.whatsapp-btn { background-color: #25D366; }
.mclist-btn { background-color: #ff8018; }
.form-btn { background-color: #3a17ff; }
.disc-btn { background-color: #E1F000; }

.whatsapp-btn:hover, .mclist-btn:hover, .form-btn:hover, .disc-btn:hover {
    transform: scale(1.05);
    filter: brightness(1.1);
}


.rules-list { max-width: 800px; margin: 0 auto; }
.rule-item { background: var(--card-bg); padding: 20px; border-radius: 10px; margin-bottom: 15px; display: flex; gap: 20px; align-items: center; }
.rule-num { font-size: 1.5rem; font-weight: 900; color: var(--primary); min-width: 40px; }

#custom-alert { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--primary); color: #000; padding: 12px 25px; border-radius: 8px; font-weight: bold; z-index: 2000; transition: 0.5s; opacity: 0; box-shadow: 0 5px 20px rgba(0,210,255,0.4); }
#custom-alert.show { transform: translateX(-50%) translateY(0); opacity: 1; }

footer { text-align: center; padding: 60px 20px; background: #000; border-top: 2px solid rgba(255, 255, 255, 0.1); }

@media (max-width: 768px) { 
    nav { height: auto; flex-direction: column; padding: 20px; gap: 15px; } 
    nav ul { gap: 15px; flex-wrap: wrap; justify-content: center; }
    .logo-text { font-size: 1.2rem; }
    .whatsapp-btn { width: 90%; text-align: center; padding: 16px 0; font-size: 1.2rem; }
}
</style>
</head>
<body>

<div class="bg-glow"></div>

<nav>
    <a href="index.html" class="nav-brand">
        <img src="assets/images/logo.png" alt="Logo" class="logo-img">
        <div class="logo-text">SirTros-city</div>
    </a>
    <ul>
        <li><a href="https://sirtros.github.io/SirTros-city/#domu">Domů</a></li>
        <li><a href="https://sirtros.github.io/SirTros-city/#info">Info</a></li>
        <li><a href="https://sirtros.github.io/SirTros-city/#galerie">Galerie</a></li>
        <li><a href="https://sirtros.github.io/SirTros-city/#odkazy">Odkazy</a></li>
        <li><a href="https://sirtros.github.io/SirTros-city/#pravidla">Pravidla</a></li>
    </ul>
</nav>

<div id="custom-alert">IP ADRESA ZKOPÍROVÁNA!</div>

<header id="404">
    <h1 style="font-size: clamp(2.5rem, 8vw, 5rem); margin-bottom: 10px;">SirTros-city - 404</h1>
    <p style="font-size: 1.1rem; margin-bottom: 35px; color: #aaa; max-width: 600px; padding: 0 20px;">
        Tato stránka nebyla nalezena. Zkontrolujte si URL adresu.
    </p>

<footer>
<p style="text-align:center; font-size:1rem; color:#fff; font-weight:900;">&copy; 2026 SIRTROS-CITY. VŠECHNA PRÁVA VYHRAZENA.</p>
</footer>

<script>
function copyIP() {
    const ip = document.getElementById('server-ip').innerText;
    const alertBox = document.getElementById('custom-alert');
    navigator.clipboard.writeText(ip).then(() => {
        alertBox.classList.add('show');
        setTimeout(() => { alertBox.classList.remove('show'); }, 3000);
    });
}
</script>
</body>
</html>
