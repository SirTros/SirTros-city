<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SirTros-city | 404</title>

<link rel="icon" type="image/png" href="assets/images/logo.png">

<style>
:root {
    --primary: #00d2ff;
    --bg: #0f0f13;
    --card-bg: rgba(255, 255, 255, 0.05);
    --text: #ffffff;
    --nav-bg: rgba(0, 0, 0, 0.95);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Roboto, sans-serif;
    scroll-behavior: smooth;
}

body {
    background-color: var(--bg);
    color: var(--text);
    line-height: 1.6;
    overflow-x: hidden;
}

/* SCROLLBAR */
body {
    overflow-y: scroll;
    scrollbar-width: thin;
    scrollbar-color: var(--primary) rgba(255,255,255,0.1);
}

body::-webkit-scrollbar { width: 10px; }
body::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
body::-webkit-scrollbar-thumb {
    background-color: var(--primary);
    border-radius: 10px;
}

/* BACKGROUND */
.bg-glow {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0f0f13 100%);
    z-index: -1;
}

/* NAV */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 10%;
    background: var(--nav-bg);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 1000;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    height: 100px;
}

.nav-brand {
    display: flex;
    align-items: center;
    gap: 20px;
    text-decoration: none;
    color: inherit;
}

.logo-img {
    height: 70px;
    border-radius: 5px;
}

.logo-text {
    font-size: 1.8rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 2px;
}

nav ul {
    display: flex;
    list-style: none;
    gap: 30px;
}

nav ul li a {
    text-decoration: none;
    color: #aaa;
    font-weight: 600;
    text-transform: uppercase;
}

nav ul li a:hover {
    color: var(--primary);
}

/* HEADER */
header {
    height: calc(100vh - 200px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

h1 {
    font-size: clamp(2.5rem, 8vw, 5rem);
    margin-bottom: 10px;
}

p {
    color: #aaa;
    max-width: 600px;
}

/* ALERT */
#custom-alert {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--primary);
    color: #000;
    padding: 12px 25px;
    border-radius: 8px;
    font-weight: bold;
    opacity: 0;
    transition: 0.5s;
}

#custom-alert.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
}

/* FOOTER */
footer {
    width: 100%;
    text-align: center;
    padding: 25px 10px;
    background: rgba(0,0,0,0.95);
    border-top: 1px solid rgba(255,255,255,0.1);
}

footer p {
    margin: 0;
    font-size: 1rem;
    color: #aaa;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
}

/* MOBILE */
@media (max-width: 768px) {
    nav {
        flex-direction: column;
        height: auto;
        padding: 20px;
        gap: 10px;
    }

    nav ul {
        flex-wrap: wrap;
        justify-content: center;
        gap: 15px;
    }
}
</style>
</head>

<body>

<div class="bg-glow"></div>

<nav>
    <a href="index.html" class="nav-brand">
        <img src="assets/images/logo.png" class="logo-img">
        <div class="logo-text">SirTros-city</div>
    </a>

    <ul>
        <li><a href="#domu">Domů</a></li>
        <li><a href="#info">Info</a></li>
        <li><a href="#galerie">Galerie</a></li>
        <li><a href="#odkazy">Odkazy</a></li>
        <li><a href="#pravidla">Pravidla</a></li>
    </ul>
</nav>

<div id="custom-alert">IP ADRESA ZKOPÍROVÁNA!</div>

<header id="domu">
    <h1>404</h1>
    <p>Tato stránka nebyla nalezena.</p>
</header>

<footer>
    <p>&copy; 2026 SIRTROS-CITY | VŠECHNA PRÁVA VYHRAZENA</p>
</footer>

<script>
function copyIP() {
    const alertBox = document.getElementById('custom-alert');
    alertBox.classList.add('show');
    setTimeout(() => alertBox.classList.remove('show'), 3000);
}
</script>

</body>
</html>
