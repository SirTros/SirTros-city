<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SirTros-city | Minecraft server</title>
    
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <link href="https://cdnjs.cloudflare.com" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00d2ff;
            --bg: #0f0f13;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --nav-bg: rgba(0, 0, 0, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; scroll-behavior: smooth; }
        body { background-color: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden; }

        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0f0f13 100%);
            z-index: -1;
        }

        /* Navigace */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 10%; background: var(--nav-bg);
            backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            height: 100px;
        }

        .nav-brand { display: flex; align-items: center; gap: 20px; text-decoration: none; color: inherit; }
        .logo-img { height: 70px; border-radius: 5px; image-rendering: -webkit-optimize-contrast; }
        .logo-text { 
            font-size: 1.8rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px;
            -webkit-box-reflect: below -12px linear-gradient(transparent, rgba(255,255,255,0.15));
        }

        nav ul { display: flex; list-style: none; gap: 30px; }
        nav ul li a { text-decoration: none; color: #aaa; font-weight: 600; text-transform: uppercase; font-size: 0.9rem; transition: 0.3s; }
        nav ul li a:hover { color: var(--primary); }

        section { padding: 100px 10%; border-bottom: 1px solid rgba(255,255,255,0.05); }
        h2 { font-size: 2.5rem; text-align: center; margin-bottom: 50px; text-transform: uppercase; letter-spacing: 3px; color: var(--primary); }

        /* Hero */
        header { height: calc(100vh - 200px); display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .whitelist-status { background: rgba(0, 210, 255, 0.1); color: var(--primary); border: 1px solid var(--primary); padding: 6px 18px; border-radius: 30px; font-size: 0.85rem; font-weight: 700; margin-bottom: 25px; }
        .ip-box { background: rgba(255,255,255,0.05); padding: 18px 35px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.3s; }
        .ip-box:hover { border-color: var(--primary); transform: scale(1.02); }

        /* Galerie */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .gallery-item { height: 220px; background: var(--card-bg); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); position: relative; cursor: pointer; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; transition: 0.5s; }
        .gallery-item:hover img { opacity: 1; transform: scale(1.05); }

        /* Lightbox */
        #lightbox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.92);
            display: none; justify-content: center; align-items: center;
            z-index: 9999; backdrop-filter: blur(8px);
            overflow: hidden;
        }
        #lightbox.active { display: flex; }
        
        #lightbox-img { 
            max-width: 85%; max-height: 85%; border-radius: 10px; 
            box-shadow: 0 0 40px rgba(0,0,0,0.8); border: 2px solid rgba(255,255,255,0.1);
            /* Plynulý přechod pro animaci */
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease; 
        }
        
        .close-btn { position: absolute; top: 30px; right: 40px; color: white; font-size: 50px; cursor: pointer; opacity: 0.6; transition: 0.3s; z-index: 10001; }
        .close-btn:hover { opacity: 1; }

        .arrow { position: absolute; top: 50%; transform: translateY(-50%); color: white; font-size: 60px; cursor: pointer; user-select: none; padding: 20px; transition: 0.3s; opacity: 0.4; z-index: 10001; }
        .arrow:hover { opacity: 1; color: var(--primary); transform: translateY(-50%) scale(1.1); }
        .prev { left: 20px; }
        .next { right: 20px; }

        /* Info Karty */
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .info-card { background: var(--card-bg); padding: 30px; border-radius: 15px; text-align: center; border: 1px solid rgba(0, 210, 255, 0.2); }
        .info-card i { font-size: 2rem; color: var(--primary); margin-bottom: 15px; }

        /* Pravidla */
        .rules-list { max-width: 800px; margin: 0 auto; }
        .rule-item { background: var(--card-bg); padding: 20px; border-radius: 10px; margin-bottom: 15px; display: flex; gap: 20px; align-items: center; }
        .rule-num { font-size: 1.5rem; font-weight: 900; color: var(--primary); min-width: 40px; }

        /* Toast Alert */
        #custom-alert { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--primary); color: #000; padding: 12px 25px; border-radius: 8px; font-weight: bold; z-index: 2000; transition: 0.5s; opacity: 0; box-shadow: 0 5px 20px rgba(0,210,255,0.4); }
        #custom-alert.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* Patička */
        footer { text-align: center; padding: 60px 20px; background: #000; border-top: 2px solid rgba(255, 255, 255, 0.1); }
        .copyright { font-size: 1rem; color: #ffffff; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }

        @media (max-width: 768px) { 
            nav { height: auto; flex-direction: column; padding: 20px; gap: 15px; } 
            nav ul { gap: 15px; } .logo-text { font-size: 1.2rem; }
            .arrow { font-size: 40px; }
        }
    </style>
</head>
