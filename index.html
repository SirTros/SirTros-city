<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SirTros-city | Minecraft server</title>

<link rel="icon" type="image/png" href="assets/images/logo.png">

<style>
:root {
    --primary: #00d2ff;
    --bg: #0f0f13;
    --card-bg: rgba(255, 255, 255, 0.05);
    --text: #ffffff;
    --nav-bg: rgba(0, 0, 0, 0.95);
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; scroll-behavior: smooth; }
body { background-color: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden; }

.bg-glow {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0f0f13 100%);
    z-index: -1;
}

header, section { scroll-margin-top: 100px; }

nav {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 10%; background: var(--nav-bg);
    backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 1000;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    height: 100px;
}

.nav-brand { display: flex; align-items: center; gap: 20px; text-decoration: none; color: inherit; }
.logo-img { height: 70px; border-radius: 5px; }
.logo-text { 
    font-size: 1.8rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px;
}

nav ul { display: flex; list-style: none; gap: 30px; }
nav ul li a { text-decoration: none; color: #aaa; font-weight: 600; text-transform: uppercase; font-size: 0.9rem; transition: 0.3s; }
nav ul li a:hover { color: var(--primary); }

section { padding: 100px 10%; border-bottom: 1px solid rgba(255,255,255,0.05); }
h2 { font-size: 2.5rem; text-align: center; margin-bottom: 50px; text-transform: uppercase; letter-spacing: 3px; color: var(--primary); }

header { height: calc(100vh - 200px); display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }

.ip-box {
    background: rgba(255,255,255,0.05);
    padding: 18px 35px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    gap: 15px;
    cursor: pointer;
    transition: 0.3s;
}
.ip-box:hover { border-color: var(--primary); transform: scale(1.02); }

footer { text-align: center; padding: 60px 20px; background: #000; }

@media (max-width: 768px) { 
    nav { flex-direction: column; padding: 20px; gap: 15px; } 
}
</style>
</head>
<body>

<div class="bg-glow"></div>

<nav>
    <a href="#" class="nav-brand">
        <img src="assets/images/logo.png" class="logo-img">
        <div class="logo-text">SirTros-city</div>
    </a>
</nav>

<header>
    <h1>SirTros-city</h1>

    <div class="ip-box" style="margin-top:20px; justify-content: space-between; width:100%; max-width:800px;">
        <span id="mc-status">🟡 Loading</span>
        <span id="mc-players">0/20 hráčů</span>
    </div>
</header>

<footer>
<p>&copy; <span id="year"></span> SIRTROS-CITY</p>
</footer>

<script>
document.getElementById('year').textContent = new Date().getFullYear();

let interval = null;

async function loadServerStatus() {
    try {
        const response = await fetch("https://api.mcstatus.io/v2/status/java/sirtros-city.aternos.me");
        const data = await response.json();

        const statusElement = document.getElementById("mc-status");
        const playersElement = document.getElementById("mc-players");

        const versionPattern = /^\d+\.\d+(\.\d+)?$/;
        const validVersion = data.version && versionPattern.test(data.version.name);
        const reallyOnline = data.online && validVersion;

        if (reallyOnline) {
            const onlinePlayers = data.players?.online ?? 0;
            statusElement.textContent = "🟢 Online";
            playersElement.textContent = onlinePlayers + "/20 hráčů";
        } else {
            statusElement.textContent = "🔴 Offline";
            playersElement.textContent = "0/20 hráčů";
        }

    } catch (err) {
        document.getElementById("mc-status").textContent = "🔴 Offline";
        document.getElementById("mc-players").textContent = "0/20 hráčů";
    }
}

function startChecking() {
    if (!interval) {
        loadServerStatus();
        interval = setInterval(loadServerStatus, 10000);
    }
}

function stopChecking() {
    clearInterval(interval);
    interval = null;
}

document.addEventListener("visibilitychange", () => {
    if (document.hidden) stopChecking();
    else startChecking();
});

startChecking();
</script>

</body>
</html>
