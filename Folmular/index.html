<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whitelist SirTros City</title>

<style>
body {
    background: #111;
    font-family: "Arial", sans-serif;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    background: #1b1b1b;
    padding: 30px;
    border-radius: 12px;
    width: 360px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    border: 3px solid #00d2ff;
}

h1 {
    text-align: center;
    color: #00d2ff;
    margin-bottom: 20px;
    text-shadow: 1px 1px 2px #000;
}

input, textarea {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    border: none;
    border-radius: 6px;
    background: #222;
    color: #fff;
    font-size: 14px;
}

input::placeholder, textarea::placeholder {
    color: #aaa;
}

label {
    display: flex;
    align-items: center;
    margin-top: 10px;
    font-size: 14px;
}

input[type="checkbox"] {
    margin-right: 10px;
    transform: scale(1.2);
}

button {
    width: 100%;
    margin-top: 15px;
    padding: 12px;
    border: none;
    border-radius: 6px;
    background: #00d2ff;
    font-weight: bold;
    color: #000;
    cursor: pointer;
    font-size: 16px;
    transition: 0.3s;
}

button:hover {
    background: #00aacc;
}

.thanks {
    text-align: center;
    font-size: 18px;
    color: #00ff00;
    margin-top: 15px;
    display: none;
}

.error {
    text-align: center;
    color: #ff4444;
    margin-top: 10px;
}
</style>
</head>
<body>

<div class="container">
    <h1>Whitelist SirTros City</h1>

    <form id="whitelistForm">
        <input type="text" name="nick" placeholder="Minecraft nick" required>
        <input type="number" name="vek" placeholder="Věk" required>
        <textarea name="proc" placeholder="Proč chceš hrát?" required></textarea>
        <input type="email" name="email" placeholder="Tvůj email pro potvrzení" required>
        <label>
            <input type="checkbox" name="slib" required>
            Slibuji, že nebudu ničit server ani ostatní hráče
        </label>
        <button type="submit">Odeslat žádost</button>
    </form>

    <div class="thanks" id="thanksMessage">
        ✅ Žádost byla odeslána! Děkujeme.
    </div>

    <div class="error" id="errorMessage"></div>
</div>

<script>
const form = document.getElementById("whitelistForm");
const thanks = document.getElementById("thanksMessage");
const errorMsg = document.getElementById("errorMessage");

form.addEventListener("submit", function(e){
    e.preventDefault();
    errorMsg.textContent = "";

    const nick = form.nick.value.trim();
    const vek = parseInt(form.vek.value);
    const proc = form.proc.value.trim();
    const email = form.email.value.trim();
    const slib = form.slib.checked;

    // validace
    if(nick.length < 3){
        errorMsg.textContent = "Nick musí mít alespoň 3 znaky!";
        return;
    }
    if(isNaN(vek) || vek < 7 || vek > 99){
        errorMsg.textContent = "Věk musí být číslo mezi 7 a 99!";
        return;
    }
    if(proc.length < 10){
        errorMsg.textContent = "Prosím, napiš alespoň 10 znaků důvodu!";
        return;
    }
    if(!email.includes("@")){
        errorMsg.textContent = "Prosím, zadej platný email!";
        return;
    }
    if(!slib){
        errorMsg.textContent = "Musíš slíbit, že nebudeš ničít server ani ostatní hráče!";
        return;
    }

    // odeslání na Formspree
    const data = new FormData(form);

    fetch("https://formspree.io/f/mgondwdr", {
        method: "POST",
        body: data,
        headers: { 'Accept': 'application/json' }
    })
    .then(response => {
        if(response.ok){
            form.style.display = "none";
            thanks.style.display = "block";
        } else {
            errorMsg.textContent = "Chyba při odesílání, zkuste to znovu.";
        }
    })
    .catch(error => {
        errorMsg.textContent = "Chyba při odesílání, zkuste to znovu.";
        console.error(error);
    });
});
</script>

</body>
</html>
